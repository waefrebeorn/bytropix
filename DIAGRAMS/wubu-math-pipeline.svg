  <text x="240" y="247" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">SSM Gated Delta Net (30/40) ✅</text>
  <text x="240" y="267" text-anchor="middle" font-size="10" fill="#555">h[t] = h[t-1]·exp(gate)</text>
  <text x="240" y="285" text-anchor="middle" font-size="10" fill="#555">+ K[t]·(V[t] − h[t-1]·K[t])·β[t]</text>
  <text x="240" y="300" text-anchor="middle" font-size="10" fill="#555">out[t] = h[t]·Q[t]</text>
  <text x="240" y="318" text-anchor="middle" font-size="9" fill="#888">16 K×128, 32 V×128, dt_rank=32</text>

  <rect x="470" y="225" width="380" height="100" rx="10" fill="url(#donegrad)" stroke="#66BB6A" stroke-width="2"/>
  <text x="660" y="247" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">GQA Full Attention (10/40) ✅</text>
  <text x="660" y="267" text-anchor="middle" font-size="10" fill="#555">Q=x·Wq, K=x·Wk, V=x·Wv</text>
  <text x="660" y="285" text-anchor="middle" font-size="10" fill="#555">attn=softmax(Q·Kᵀ/√d)·V</text>
  <text x="660" y="300" text-anchor="middle" font-size="10" fill="#555">gated: out=silu(attn)·sigmoid(gate)</text>
  <text x="660" y="318" text-anchor="middle" font-size="9" fill="#888">16 Q×256, 2 KV×256, MRoPE</text>

