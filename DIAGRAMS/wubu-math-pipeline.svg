  <text x="660" y="577" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Nested MoE (16×16) ✅</text>
  <text x="660" y="595" text-anchor="middle" font-size="9" fill="#555">Poincaré distance routing hierarchy</text>
  <text x="660" y="607" text-anchor="middle" font-size="9" fill="#555">396/396 tests, top-8 select</text>

  <line x1="450" y1="610" x2="450" y2="635" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

