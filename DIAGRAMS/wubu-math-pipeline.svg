  <text x="450" y="653" text-anchor="middle" font-size="11" font-weight="bold" fill="#D32F2F">⚠️ HONEST Note (May 16): Modules compile & run but inference is BROKEN</text>
  <text x="450" y="670" text-anchor="middle" font-size="10" fill="#555">Only 2/8 binaries verified correct. 6/15 components forward-only (no gradient flow). NaN fixed. See devils_advocate_v5.md</text>
  <text x="450" y="686" text-anchor="middle" font-size="9" fill="#888">Verified good: NaN fix (IQ2_XXS block layout), per-expert dequant 3.9ms → 11s/step, 0 NaN all configs</text>
