  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#D32F2F">⚠️ WuBu Math — Geometric Pipeline (HONEST May 16)</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#666">Modules compile and run but inference output is BROKEN. Backward passes missing for 6 components.</text>

  <!-- Row 1: Embedding -->
  <rect x="300" y="80" width="300" height="45" rx="10" fill="url(#euclidean)" stroke="#7986CB" stroke-width="2"/>
  <text x="450" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="#283593">Qwen Token Embeddings (Euclidean)</text>
  <text x="450" y="117" text-anchor="middle" font-size="10" fill="#555">248320 × 2048 | Q5_K → f32</text>
  <line x1="450" y1="125" x2="450" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

