  <text x="450" y="412" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Poincaré SSM Recurrence ✅</text>
  <text x="450" y="432" text-anchor="middle" font-size="10" fill="#555">h[t]=exp_map(A·log_map(h[t-1])⊕B·log_map(k⊗v))</text>
  <text x="450" y="446" text-anchor="middle" font-size="9" fill="#888">2835 tok/s GPU | Tested on 30 SSM layers</text>
  <line x1="450" y1="450" x2="450" y2="475" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

