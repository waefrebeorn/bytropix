  <text x="175" y="497" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">RSGD Optimizer ✅</text>
  <text x="175" y="515" text-anchor="middle" font-size="9" fill="#555">exp_map(tangent step)→ball</text>
  <text x="175" y="527" text-anchor="middle" font-size="9" fill="#555">Validated: ||h||&lt;R</text>

  <rect x="325" y="475" width="250" height="55" rx="8" fill="url(#donegrad)" stroke="#66BB6A" stroke-width="2"/>
  <text x="450" y="497" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Poincaré GQA ✅</text>
  <text x="450" y="515" text-anchor="middle" font-size="9" fill="#555">attn=softmax(-d(q_ball,k_ball)/τ)</text>
  <text x="450" y="527" text-anchor="middle" font-size="9" fill="#555">4/4 tests pass</text>

  <rect x="600" y="475" width="250" height="55" rx="8" fill="url(#donegrad)" stroke="#66BB6A" stroke-width="2"/>
  <text x="725" y="497" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Nested SSM K=4 ✅</text>
  <text x="725" y="515" text-anchor="middle" font-size="9" fill="#555">Product of 4 Poincaré balls</text>
  <text x="725" y="527" text-anchor="middle" font-size="9" fill="#555">K=1, K=4 uniform, K=4 biased</text>

  <line x1="450" y1="530" x2="450" y2="555" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 6: Training level -->
