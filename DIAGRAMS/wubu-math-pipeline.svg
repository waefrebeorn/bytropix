  <path d="M 660 325 L 660 360 L 450 360" fill="none" stroke="#555" stroke-width="2"/>
  <line x1="450" y1="355" x2="450" y2="390" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

