  <text x="450" y="171" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">Poincaré Ball Map ✅</text>
  <text x="450" y="189" text-anchor="middle" font-size="10" fill="#555">exp_map: ℝⁿ → 𝔻ⁿ(R) | R=0.956 | 95% NN</text>
  <line x1="450" y1="200" x2="450" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

