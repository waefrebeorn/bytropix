<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="monospace">
  <defs>
    <linearGradient id="euclidean" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="mobius" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="poincare" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="out" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">WuBu Math — Geometric Pipeline</text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#666">Euclidean → Poincaré Ball → Möbius Gyration → Nested Hyperbolic Hierarchies</text>

  <!-- Row 1: Embedding -->
  <rect x="300" y="85" width="300" height="45" rx="10" fill="url(#euclidean)" stroke="#7986CB" stroke-width="2"/>
  <text x="450" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#283593">Qwen Token Embeddings (Euclidean)</text>
  <text x="450" y="122" text-anchor="middle" font-size="10" fill="#555">248320 × 2048 | Q5_K → f32 dequantized</text>

  <line x1="450" y1="130" x2="450" y2="155" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 2: Poincaré Map -->
  <rect x="300" y="155" width="300" height="50" rx="10" fill="url(#poincare)" stroke="#64B5F6" stroke-width="2"/>
  <text x="450" y="176" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">Poincaré Ball Map</text>
  <text x="450" y="194" text-anchor="middle" font-size="10" fill="#555">exp_map: ℝⁿ → 𝔻ⁿ(R) | R = 0.956 = 3×mean_norm</text>

  <line x1="450" y1="205" x2="450" y2="230" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 3: SSM Recurrence -->
  <rect x="50" y="230" width="380" height="100" rx="10" fill="url(#euclidean)" stroke="#7986CB" stroke-width="1.5"/>
  <text x="240" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#283593">SSM Gated Delta Net (30/40 layers)</text>
  <text x="240" y="272" text-anchor="middle" font-size="10" fill="#555">h[t] = h[t-1]·exp(gate)</text>
  <text x="240" y="290" text-anchor="middle" font-size="10" fill="#555">+ K[t]·(V[t] − h[t-1]·K[t])·β[t]</text>
  <text x="240" y="310" text-anchor="middle" font-size="10" fill="#555">out[t] = h[t]·Q[t]</text>
  <text x="240" y="325" text-anchor="middle" font-size="9" fill="#888">16 K-heads × 128 | 32 V-heads × 128</text>

  <rect x="470" y="230" width="380" height="100" rx="10" fill="url(#euclidean)" stroke="#7986CB" stroke-width="1.5"/>
  <text x="660" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#283593">GQA Full Attention (10/40 layers)</text>
  <text x="660" y="272" text-anchor="middle" font-size="10" fill="#555">Q = x·Wq, K = x·Wk, V = x·Wv</text>
  <text x="660" y="290" text-anchor="middle" font-size="10" fill="#555">attn = softmax(Q·Kᵀ/√d) · V</text>
  <text x="660" y="310" text-anchor="middle" font-size="10" fill="#555">gated: out = silu(attn) · sigmoid(gate)</text>
  <text x="660" y="325" text-anchor="middle" font-size="9" fill="#888">16 Q-heads × 256 | 2 KV-heads × 256</text>

  <!-- Diverge arrow down -->
  <path d="M 240 330 L 240 370 L 450 370" fill="none" stroke="#555" stroke-width="2"/>
  <path d="M 660 330 L 660 370 L 450 370" fill="none" stroke="#555" stroke-width="2"/>
  <line x1="450" y1="360" x2="450" y2="400" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 4: Poincaré SSM -->
  <rect x="200" y="400" width="500" height="60" rx="10" fill="url(#mobius)" stroke="#FF8A65" stroke-width="2"/>
  <text x="450" y="422" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Poincaré Hyperbolic Recurrence</text>
  <text x="450" y="442" text-anchor="middle" font-size="10" fill="#555">h[t] = exp_map(A · log_map(h[t-1]) ⊕ B · log_map(k ⊗ v))</text>
  <text x="450" y="454" text-anchor="middle" font-size="9" fill="#888">A = exp(-exp(A_log)·softplus(α)) | B = sigmoid(β)</text>

  <line x1="450" y1="460" x2="450" y2="490" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 5: Möbius Gyration -->
  <rect x="250" y="490" width="400" height="55" rx="10" fill="url(#mobius)" stroke="#FF8A65" stroke-width="1.5"/>
  <text x="450" y="512" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Möbius Gyration in Tangent Space</text>
  <text x="450" y="530" text-anchor="middle" font-size="10" fill="#555">gyr[u,v]w = (−u ⊕ v) ⊕ (u ⊕ w) | Full quaternion SO(4) rotation</text>
  <text x="450" y="542" text-anchor="middle" font-size="10" fill="#555">log_map → SO(4) rotate → exp_map (bounded by R)</text>

  <line x1="450" y1="545" x2="450" y2="570" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 6: Nested -->
  <rect x="200" y="570" width="500" height="50" rx="10" fill="url(#out)" stroke="#CE93D8" stroke-width="2"/>
  <text x="450" y="592" text-anchor="middle" font-size="13" font-weight="bold" fill="#6A1B9A">Nested Hyperbolic Hierarchy (Future)</text>
  <text x="450" y="610" text-anchor="middle" font-size="10" fill="#555">Russian-doll geometry: each level has its own curvature cₙ, scale sₙ, rotation Rₙ</text>

  <!-- Legend -->
  <text x="30" y="645" font-size="11" fill="#888">Legend: [Euclidean ops] → [Poincaré ball] → [Möbius gyration] → [Nested levels]</text>
</svg>
