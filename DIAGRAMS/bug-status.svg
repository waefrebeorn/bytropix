<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="monospace">
  <defs>
    <linearGradient id="fixed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8E6C9"/><stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <linearGradient id="critical" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4444"/><stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="fixed_label" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Bug Status — May 19 2026 (Phase 9.5 Complete)</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#666">Ref: llama.cpp | Model: Qwen3.6-35B-A3B-UD-IQ2_M.gguf | Cos-sim: 0.9967</text>

  <!-- Legend -->
  <rect x="150" y="65" width="14" height="14" rx="2" fill="#66BB6A"/><text x="170" y="77" font-size="11" fill="#555">Fixed</text>
  <rect x="300" y="65" width="14" height="14" rx="2" fill="#FF4444"/><text x="320" y="77" font-size="11" fill="#555">Critical (had wrong DA)</text>

  <!-- Bug 7: Q6_K Vec Dot (CRITICAL) -->
  <rect x="50" y="100" width="800" height="55" rx="4" fill="url(#critical)"/>
  <text x="65" y="118" font-size="13" font-weight="bold" fill="#fff">Bug 7: Q6_K vec_dot AVX2 loop iteration count ⭐ FIXED</text>
  <text x="65" y="135" font-size="11" fill="#fee">Root cause: j &lt; QK_K/32 → only 128/256 elements processed</text>
  <text x="65" y="150" font-size="11" fill="#fee">Impact: shared expert output projection (70 Q6_K tensors) across ALL 40 layers. Cos-sim 0.794 → 0.9967.</text>
  <rect x="720" y="105" width="110" height="22" rx="3" fill="#66BB6A"/>
  <text x="775" y="120" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">✅ FIXED</text>

  <!-- DA v10 Correction -->
  <rect x="50" y="165" width="800" height="40" rx="4" fill="#FFDDDD" stroke="#FF4444" stroke-width="1"/>
  <text x="65" y="183" font-size="12" font-weight="bold" fill="#CC0000">⚠ DA v10 analysis was WRONG: claimed "softmax vs sigmoid" but both use softmax</text>
  <text x="65" y="198" font-size="11" fill="#880000">Real root cause was Q6_K loop bug. GQA interleave fix (Bug 1) was correct. Component isolation test caught this.</text>

  <!-- Bug 1: GQA Interleave -->
  <rect x="50" y="220" width="380" height="45" rx="4" fill="url(#fixed)"/>
  <text x="65" y="238" font-size="13" font-weight="bold" fill="#2E7D32">Bug 1: GQA Q/Gate Interleave ✅</text>
  <text x="65" y="255" font-size="11" fill="#444">attn_q.weight is per-head [Q|gate] interleaved, not contiguous</text>
  <rect x="300" y="225" width="110" height="22" rx="3" fill="#43A047"/>
  <text x="355" y="240" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">✅ FIXED</text>

  <!-- Bug 2: IMRoPE -->
  <rect x="470" y="220" width="380" height="45" rx="4" fill="url(#fixed)"/>
  <text x="485" y="238" font-size="13" font-weight="bold" fill="#2E7D32">Bug 2: IMRoPE Not Implemented ✅</text>
  <text x="485" y="255" font-size="11" fill="#444">Sections=[11,11,10,0] frequency bands needed</text>
  <rect x="720" y="225" width="110" height="22" rx="3" fill="#43A047"/>
  <text x="775" y="240" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">✅ FIXED</text>

  <!-- Bug 3: OMP Race -->
  <rect x="50" y="280" width="380" height="45" rx="4" fill="url(#fixed)"/>
  <text x="65" y="298" font-size="13" font-weight="bold" fill="#2E7D32">Bug 3: MoE OpenMP Race ✅</text>
  <text x="65" y="315" font-size="11" fill="#444">Shared scratch buffer across threads</text>
  <rect x="300" y="285" width="110" height="22" rx="3" fill="#43A047"/>
  <text x="355" y="300" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">✅ FIXED</text>

  <!-- Bug 4: SSM State -->
  <rect x="470" y="280" width="380" height="45" rx="4" fill="url(#fixed)"/>
  <text x="485" y="298" font-size="13" font-weight="bold" fill="#2E7D32">Bug 4-6: SSM/MTP Bugs ✅</text>
  <text x="485" y="315" font-size="11" fill="#444">SSM state carry, KV cache append, MTP crashes</text>
  <rect x="720" y="285" width="110" height="22" rx="3" fill="#43A047"/>
  <text x="775" y="300" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">✅ FIXED</text>

  <!-- Summary -->
  <rect x="50" y="350" width="800" height="120" rx="4" fill="#F5F5F5"/>
  <text x="65" y="370" font-size="13" font-weight="bold" fill="#333">Summary: 7 bugs found and fixed. 1 critical (Q6_K).</text>
  <text x="65" y="390" font-size="11" fill="#555">Phase 9.5: Q6_K vec_dot AVX2 loop iteration count (j &lt; QK_K/32 → j &lt; QK_K/16)</text>
  <text x="65" y="408" font-size="11" fill="#555">DA v10 post-mortem: Softmax vs sigmoid theory was WRONG. Component isolation test found the real bug.</text>
  <text x="65" y="426" font-size="11" fill="#555">Lesson: Never trust root cause analysis without testing each quant type against F32 SGEMM separately.</text>
  <text x="65" y="444" font-size="11" fill="#555">Current: Cos-sim 0.9967. KV cache: 256k F16. Decode: 7.0 tok/s. All 7 quant types verified.</text>
</svg>
