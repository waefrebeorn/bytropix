<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="monospace">
  <defs>
    <linearGradient id="gguf-in" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="gguf-parse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="extract" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="map" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="verify" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="mathbox" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">GGUF → C/CUDA Pipeline</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#666">Qwen3.6-35B-A3B → WuBu hyperbolic embeddings → 7 math extensions → training</text>

  <!-- Step 1: GGUF -->
  <rect x="300" y="75" width="300" height="50" rx="10" fill="url(#gguf-in)" stroke="#7986CB" stroke-width="2"/>
  <text x="450" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#283593">1. Qwen3.6-35B-A3B GGUF</text>
  <text x="450" y="114" text-anchor="middle" font-size="10" fill="#555">IQ2_M quant | 733 tensors | 248K vocab</text>
  <line x1="450" y1="125" x2="450" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Parser -->
  <rect x="280" y="150" width="340" height="50" rx="10" fill="url(#gguf-parse)" stroke="#FF8A65" stroke-width="2"/>
  <text x="450" y="171" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">2. gguf_reader.c</text>
  <text x="450" y="189" text-anchor="middle" font-size="10" fill="#555">13 GGML types | 733 tensor offsets | Dequant fixed</text>
  <line x1="450" y1="200" x2="450" y2="225" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Fork -->
  <path d="M 450 200 L 450 210 L 240 210 L 240 225" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 450 200 L 450 210 L 660 210 L 660 225" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3a: Weight extraction -->
  <rect x="40" y="225" width="400" height="55" rx="10" fill="url(#extract)" stroke="#66BB6A" stroke-width="2"/>
  <text x="240" y="247" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">3a. Weights → Model Forward</text>
  <text x="240" y="265" text-anchor="middle" font-size="10" fill="#555">40 layers: SSM+Conv+GQA+MoE+output</text>
  <text x="240" y="278" text-anchor="middle" font-size="10" fill="#555">src/wubu_ssm.c | tools/test_model.c | train_gpu</text>

  <!-- 3b: Embeddings -->
  <rect x="460" y="225" width="400" height="55" rx="10" fill="url(#extract)" stroke="#66BB6A" stroke-width="2"/>
  <text x="660" y="247" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">3b. Embedding Extraction</text>
  <text x="660" y="265" text-anchor="middle" font-size="10" fill="#555">token_embd.weight Q5_K → f32 → .bin</text>
  <text x="660" y="278" text-anchor="middle" font-size="10" fill="#555">data/qwen36_embeddings_c.bin (2.03GB)</text>

  <line x1="660" y1="280" x2="660" y2="305" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4: Poincaré map -->
  <rect x="460" y="305" width="400" height="50" rx="10" fill="url(#map)" stroke="#64B5F6" stroke-width="2"/>
  <text x="660" y="326" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0">4. Poincaré Ball (R=0.956)</text>
  <text x="660" y="344" text-anchor="middle" font-size="10" fill="#555">exp_map: Euclidean → ball | 95% NN preserved</text>

  <!-- Integration arrow -->
  <path d="M 240 280 L 240 340 L 100 340 L 100 435" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <path d="M 660 355 L 660 380 L 100 380 L 100 435" fill="none" stroke="#555" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>

  <!-- Assembly box -->
  <rect x="30" y="435" width="840" height="245" rx="8" fill="#FAFAFA" stroke="#DDD"/>
  <text x="50" y="455" font-size="13" font-weight="bold" fill="#333">MATHEMATICS &amp; IMPLEMENTATION EXTENSIONS (May 14-15 Sprint)</text>

  <!-- 7 modules as grid -->
  <rect x="45" y="470" width="250" height="45" rx="6" fill="url(#mathbox)" stroke="#4DD0E1" stroke-width="1.5"/>
  <text x="170" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#006064">RSGD Optimizer</text>
  <text x="170" y="507" text-anchor="middle" font-size="9" fill="#555">Riemannian SGD in tangent space</text>

  <rect x="310" y="470" width="250" height="45" rx="6" fill="url(#mathbox)" stroke="#4DD0E1" stroke-width="1.5"/>
  <text x="435" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#006064">Poincaré GQA</text>
  <text x="435" y="507" text-anchor="middle" font-size="9" fill="#555">Hyperbolic distance attention</text>

  <rect x="575" y="470" width="280" height="45" rx="6" fill="url(#mathbox)" stroke="#4DD0E1" stroke-width="1.5"/>
  <text x="715" y="490" text-anchor="middle" font-size="11" font-weight="bold" fill="#006064">Nested SSM (K=4)</text>
  <text x="715" y="507" text-anchor="middle" font-size="9" fill="#555">Product of K Poincaré balls</text>

  <rect x="45" y="525" width="250" height="45" rx="6" fill="url(#mathbox)" stroke="#4DD0E1" stroke-width="1.5"/>
  <text x="170" y="545" text-anchor="middle" font-size="11" font-weight="bold" fill="#006064">TST Training</text>
  <text x="170" y="562" text-anchor="middle" font-size="9" fill="#555">Bag MCE loss 8/8 ✓</text>

  <rect x="310" y="525" width="250" height="45" rx="6" fill="url(#mathbox)" stroke="#4DD0E1" stroke-width="1.5"/>
  <text x="435" y="545" text-anchor="middle" font-size="11" font-weight="bold" fill="#006064">Nested MoE (16×16)</text>
  <text x="435" y="562" text-anchor="middle" font-size="9" fill="#555">Poincaré distance hierarchy</text>

  <rect x="575" y="525" width="280" height="45" rx="6" fill="url(#mathbox)" stroke="#4DD0E1" stroke-width="1.5"/>
  <text x="715" y="545" text-anchor="middle" font-size="11" font-weight="bold" fill="#006064">CUDA Kernels</text>
  <text x="715" y="562" text-anchor="middle" font-size="9" fill="#555">SSM scan + MoE dispatch</text>

  <rect x="45" y="580" width="250" height="45" rx="6" fill="url(#mathbox)" stroke="#4DD0E1" stroke-width="1.5"/>
  <text x="170" y="600" text-anchor="middle" font-size="11" font-weight="bold" fill="#006064">Vision→Text Pipeline</text>
  <text x="170" y="617" text-anchor="middle" font-size="9" fill="#555">GPU ViT 217ms, 0 NaN</text>

  <rect x="310" y="580" width="250" height="45" rx="6" fill="url(#mathbox)" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="435" y="600" text-anchor="middle" font-size="11" fill="#888">Moondream3 (weights only)</text>
  <text x="435" y="617" text-anchor="middle" font-size="9" fill="#aaa">Stub — not wired</text>

  <rect x="575" y="580" width="280" height="45" rx="6" fill="url(#mathbox)" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="715" y="600" text-anchor="middle" font-size="11" fill="#888">Data Pipeline</text>
  <text x="715" y="617" text-anchor="middle" font-size="9" fill="#aaa">1.07M tokens — format unverified</text>

  <!-- Bottom status -->
  <text x="50" y="655" font-size="11" fill="#e53935">⚠ Standalone status: all 7 math modules pass tests but NONE wired to train_gpu. GPU vision timed out. 0.5% NaN persists.</text>
</svg>
