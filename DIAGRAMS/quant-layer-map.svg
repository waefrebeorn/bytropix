  <text x="120" y="352" font-size="12" font-weight="bold" fill="#333">Former Claims vs Reality (DA v9 Audit):</text>
  <text x="120" y="372" font-size="10" fill="#555">❌ "L39 down_exps is IQ4_XS? Was it IQ1_M?" — Python mislabeled type 23 as IQ1_M. It IS IQ4_XS ✓</text>
