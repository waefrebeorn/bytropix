<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="'Courier New', monospace" font-size="12">
  <rect width="900" height="750" fill="#1a1a2e"/>
  <text x="20" y="30" fill="#00ff88" font-size="16" font-weight="bold">bytropix — Status May 19 2026 (04:15) — Phase 8 Complete</text>
  <text x="20" y="46" fill="#888" font-size="11">Qwen3.6-35B-A3B-UD-IQ2_M | Ryzen 7950X | 4.7 tok/s decode | Expert Prefetch L3 + Output Proj OMP</text>

  <!-- Phase boxes -->
  <rect x="20" y="58" width="270" height="24" rx="4" fill="#0d3b0d" stroke="#00ff88" stroke-width="1"/>
  <text x="28" y="74" fill="#00ff88" font-size="11">Phases 0-6 ✓ Core, MTP, State Save/Restore</text>
  <rect x="300" y="58" width="270" height="24" rx="4" fill="#0d3b0d" stroke="#00ff88" stroke-width="1"/>
  <text x="308" y="74" fill="#00ff88" font-size="11">Phase 7 ✓ Hardware Saturation (AVX2, GQA opt)</text>
  <rect x="580" y="58" width="300" height="24" rx="4" fill="#0d3b0d" stroke="#00ff88" stroke-width="1"/>
  <text x="588" y="74" fill="#00ff88" font-size="11">Phase 8 ✓ Expert Prefetch + Out Proj OMP</text>

  <rect x="20" y="86" width="420" height="24" rx="4" fill="#1a1a3d" stroke="#4488ff" stroke-width="1"/>
  <text x="28" y="102" fill="#4488ff" font-size="11">Phase 9 — KV Cache for GQA [NEXT P0]</text>
  <rect x="450" y="86" width="430" height="24" rx="4" fill="#1a1a3d" stroke="#4488ff" stroke-width="1"/>
  <text x="458" y="102" fill="#4488ff" font-size="11">Phase 10 — Cos-sim 1:1 Parity [P0]</text>

  <!-- Benchmarks table -->
  <text x="20" y="140" fill="#ffaa00" font-size="14" font-weight="bold">▸ LIVE BENCHMARKS (DA-1 verified where marked)</text>
  <line x1="20" y1="146" x2="860" y2="146" stroke="#333" stroke-width="1"/>

  <text x="20" y="164" fill="#888" font-size="11">Metric</text>
  <text x="220" y="164" fill="#888" font-size="11">Value</text>
  <text x="370" y="164" fill="#888" font-size="11">Verification</text>
  <text x="550" y="164" fill="#888" font-size="11">Method</text>
  <line x1="20" y1="168" x2="860" y2="168" stroke="#333" stroke-width="1"/>

  <!-- Decode speed -->
  <text x="20" y="186" fill="#ccc" font-size="12">Decode speed</text>
  <text x="220" y="186" fill="#00ff88" font-size="12">4.7 tok/s</text>
  <text x="370" y="186" fill="#00ff88" font-size="12">✅ Verified</text>
  <text x="550" y="186" fill="#aaa" font-size="11">64 tok in 13.70s, gen_text direct</text>

  <!-- Prefill speed -->
  <text x="20" y="206" fill="#ccc" font-size="12">Prefill speed</text>
  <text x="220" y="206" fill="#00ff88" font-size="12">16.2 tok/s</text>
  <text x="370" y="206" fill="#00ff88" font-size="12">✅ Verified</text>
  <text x="550" y="206" fill="#aaa" font-size="11">27 tok in 1.67s, CHAT=1 mode</text>

  <!-- Output proj -->
  <text x="20" y="226" fill="#ccc" font-size="12">Output proj decode</text>
  <text x="220" y="226" fill="#ff8800" font-size="12">~16.5ms</text>
  <text x="370" y="226" fill="#00ff88" font-size="12">✅ Verified</text>
  <text x="550" y="226" fill="#aaa" font-size="11">PROFILE=1 first decode token</text>

  <!-- MoE decode -->
  <text x="20" y="246" fill="#ccc" font-size="12">MoE decode / layer</text>
  <text x="220" y="246" fill="#00ff88" font-size="12">~2.3ms</text>
  <text x="370" y="246" fill="#00ff88" font-size="12">✅ Verified</text>
  <text x="550" y="246" fill="#aaa" font-size="11">PROFILE=1 MoE column, 1.8-2.4ms</text>

  <!-- Cos-sim -->
  <text x="20" y="266" fill="#ccc" font-size="12">Cos-sim vs llama.cpp</text>
  <text x="220" y="266" fill="#ff4444" font-size="12">0.7944</text>
  <text x="370" y="266" fill="#ff4444" font-size="12">❌ Known gap</text>
  <text x="550" y="266" fill="#aaa" font-size="11">L0=0.86, L39=0.46. Pre-Phase8, not regressed</text>

  <!-- Per-layer cos breakdown -->
  <text x="20" y="286" fill="#888" font-size="11">Per-layer cos-sim</text>
  <text x="220" y="286" fill="#ff8800" font-size="11">L0-SSM=0.86</text>
  <text x="370" y="286" fill="#ff8800" font-size="11">L1-SSM=0.75</text>
  <text x="550" y="286" fill="#ff4444" font-size="11">L32-L39: 0.88→0.46 sharp drop</text>

  <!-- Stale claims -->
  <text x="20" y="320" fill="#ffaa00" font-size="14" font-weight="bold">▸ STALE CLAIMS (DA-1 flagged ❓)</text>
  <line x1="20" y1="326" x2="860" y2="326" stroke="#333" stroke-width="1"/>

  <text x="20" y="346" fill="#ccc" font-size="12">No llama deps</text>
  <text x="220" y="346" fill="#ff8800" font-size="12">—</text>
  <text x="370" y="346" fill="#ff8800" font-size="12">❓ Stale</text>
  <text x="550" y="346" fill="#aaa" font-size="11">Last ldd+nm verified Phase 7. May need re-run.</text>

  <!-- Performance breakdown -->
  <text x="20" y="390" fill="#ffaa00" font-size="14" font-weight="bold">▸ BOTTLENECK DISTRIBUTION (decode, one token, 16 threads)</text>
  <line x1="20" y1="396" x2="860" y2="396" stroke="#333" stroke-width="1"/>

  <!-- MoE bar -->
  <text x="20" y="418" fill="#ff6b6b" font-size="11">MoE (40 layers × 8 exp × 3 matmul)</text>
  <rect x="260" y="408" width="350" height="16" rx="2" fill="#ff6b6b" opacity="0.8"/>
  <text x="620" y="418" fill="#ff6b6b" font-size="11">~92ms (55%)</text>

  <!-- SSM+GQA -->
  <text x="20" y="440" fill="#88ccff" font-size="11">SSM + GQA attention (40 layers)</text>
  <rect x="260" y="430" width="150" height="16" rx="2" fill="#88ccff" opacity="0.8"/>
  <text x="420" y="440" fill="#88ccff" font-size="11">~40ms (24%)</text>

  <!-- Output proj -->
  <text x="20" y="462" fill="#ffaa88" font-size="11">Output projection</text>
  <rect x="260" y="452" width="63" height="16" rx="2" fill="#ffaa88" opacity="0.8"/>
  <text x="333" y="462" fill="#ffaa88" font-size="11">~16ms (10%)</text>

  <!-- Norms/overhead -->
  <text x="20" y="484" fill="#88ff88" font-size="11">Norms + router + emb I/O + overhead</text>
  <rect x="260" y="474" width="72" height="16" rx="2" fill="#88ff88" opacity="0.8"/>
  <text x="342" y="484" fill="#88ff88" font-size="11">~19ms (11%)</text>

  <!-- Total bar -->
  <line x1="20" y1="496" x2="860" y2="496" stroke="#333" stroke-width="1"/>
  <text x="20" y="514" fill="#fff" font-size="12" font-weight="bold">Total decode: ~168ms → 6 tok/s ceiling (actual 4.7 due to emb file I/O + sampling)</text>

  <!-- Phase 8 improvements -->
  <text x="20" y="548" fill="#ffaa00" font-size="14" font-weight="bold">▸ PHASE 8 IMPROVEMENTS (2.2× decode speedup)</text>
  <line x1="20" y1="554" x2="860" y2="554" stroke="#333" stroke-width="1"/>

  <text x="20" y="572" fill="#ccc" font-size="11">8.1 AVX2 IQ2_XXS vec_dot: ported from llama.cpp, keven_signs_q2xs table, _mm256_sign_epi8</text>
  <text x="20" y="590" fill="#ccc" font-size="11">8.2 OpenMP task dispatch: omp taskgroup + tasks (no atomic), single parallel region</text>
  <text x="20" y="608" fill="#ccc" font-size="11">8.3 Expert Prefetch: FULL-STRIDE ~264KB(gate/up)+392KB(down)/expert → L3 via _MM_HINT_T2</text>
  <text x="20" y="626" fill="#ccc" font-size="11">    Before: 256 bytes/expert → L1 (0.03% coverage). After: ~7.4MB for 8 experts → L3</text>
  <text x="20" y="644" fill="#ccc" font-size="11">8.4 Output Proj Split: #pragma omp parallel for if(N > 1) on outer token loop for prefill</text>
  <text x="20" y="662" fill="#ccc" font-size="11">    Nested OMP disabled by default — inner quantized_matmul uses 1 thread per token</text>

  <!-- Cold Gaps -->
  <text x="20" y="696" fill="#ffaa00" font-size="14" font-weight="bold">▸ NEXT: Phase 9 KV Cache for GQA [P0] | Phase 10 Cos-sim Parity [P0]</text>
  <line x1="20" y1="702" x2="860" y2="702" stroke="#333" stroke-width="1"/>
  <text x="20" y="718" fill="#888" font-size="11">KV Cache: GQA layers (10/40) recompute full attention each decode — O(n²) at 256K ctx</text>
  <text x="20" y="734" fill="#888" font-size="11">Cos-sim Parity: SSM L0 cos=0.86 — need intermediate dump comparison vs llama.cpp</text>
</svg>
