<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Courier New', monospace" font-size="12">
  <rect width="900" height="620" fill="#1a1a2e"/>
  <text x="20" y="30" fill="#ff4444" font-size="16" font-weight="bold"> bytropix GPU_SUPPORT — What's Connected, What's Dead, What's Broken</text>
  <text x="20" y="46" fill="#888" font-size="11">Phase 28b DA Audit — SSM GPU path architecture with honest verification status. Red = broken/dead, Yellow = unverified, Green = working.</text>

  <!-- CPU path group -->
  <rect x="20" y="60" width="860" height="80" rx="4" fill="#0d1b0d" stroke="#00ff88" stroke-width="1"/>
  <text x="30" y="78" fill="#00ff88" font-size="13" font-weight="bold">CPU Only Path (gen_text) — Works, Verified</text>
  <text x="30" y="96" fill="#aaa" font-size="11">wubu_model_forward_from_embd → SSM layers → wubu_ssm_forward() (all on CPU)</text>
  <text x="30" y="112" fill="#aaa" font-size="11">MoE: wubu_moe_forward (CPU quant matmul, 8 experts + shared)</text>
  <text x="30" y="128" fill="#aaa" font-size="11">GQA: wubu_gqa_forward (CPU, Q4_0 KV cache)</text>
  <text x="450" y="128" fill="#00ff88" font-size="11">✅ Verified vs llama.cpp (cos-sim 0.9994 at 4K)</text>

  <!-- GPU GQA path -->
  <rect x="20" y="150" width="400" height="70" rx="4" fill="#0d3b0d" stroke="#00ff88" stroke-width="1"/>
  <text x="30" y="170" fill="#00ff88" font-size="11" font-weight="bold">GPU GQA Attention — Works</text>
  <text x="30" y="188" fill="#aaa" font-size="10">wubu_model_gpu_gqa_forward()</text>
  <text x="30" y="204" fill="#aaa" font-size="10">cuBLAS SGEMM on F32 GQA weights</text>

  <!-- GPU MoE path -->
  <rect x="440" y="150" width="420" height="70" rx="4" fill="#1d3b0d" stroke="#00ff88" stroke-width="1"/>
  <text x="450" y="170" fill="#00ff88" font-size="11" font-weight="bold">GPU MoE Experts — Works</text>
  <text x="450" y="188" fill="#aaa" font-size="10">wubu_gpu_moe_forward_experts()</text>
  <text x="450" y="204" fill="#aaa" font-size="10">Per-expert quant kernel, CPU router, H2D on cache miss</text>

  <!-- GPU Output Proj -->
  <rect x="20" y="230" width="400" height="50" rx="4" fill="#0d3b0d" stroke="#00ff88" stroke-width="1"/>
  <text x="30" y="250" fill="#00ff88" font-size="11" font-weight="bold">GPU Output Projection — Works</text>
  <text x="30" y="266" fill="#aaa" font-size="10">gpu_output_project() — Q4_K quantized kernel</text>

  <!-- GPU SSM group -->
  <rect x="20" y="295" width="860" height="130" rx="4" fill="#3d0d0d" stroke="#ff4444" stroke-width="2"/>
  <text x="30" y="313" fill="#ff4444" font-size="13" font-weight="bold">GPU SSM Path (Phase 28 — NEW) — UNVERIFIED</text>
  <text x="30" y="331" fill="#ff6644" font-size="11">wubu_model_gpu_ssm_forward_full() — Called per SSM layer when gpu_ctx != NULL</text>

  <!-- Sub-boxes within GPU SSM group -->
  <rect x="35" y="340" width="190" height="70" rx="3" fill="#2d1d0d" stroke="#ffaa00" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="130" y="358" fill="#ffaa00" font-size="10" text-anchor="middle">row_major quant matmul</text>
  <text x="130" y="372" fill="#aaa" font-size="9" text-anchor="middle">For qkv + gate + ssm_out</text>
  <text x="130" y="386" fill="#ffaa00" font-size="9" text-anchor="middle">🟡 Only vs F32 dequant</text>

  <rect x="235" y="340" width="190" height="70" rx="3" fill="#2d1d0d" stroke="#ffaa00" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="330" y="358" fill="#ffaa00" font-size="10" text-anchor="middle">ssm_beta_alpha fused</text>
  <text x="330" y="372" fill="#aaa" font-size="9" text-anchor="middle">1 kernel replaces 6</text>
  <text x="330" y="386" fill="#ffaa00" font-size="9" text-anchor="middle">🟡 Verified vs DEAD code</text>

  <rect x="435" y="340" width="190" height="70" rx="3" fill="#2d1d0d" stroke="#ffaa00" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="530" y="358" fill="#ffaa00" font-size="10" text-anchor="middle">ssm_conv_silu_split</text>
  <text x="530" y="372" fill="#aaa" font-size="9" text-anchor="middle">Combines 5 launches → 1</text>
  <text x="530" y="386" fill="#ffaa00" font-size="9" text-anchor="middle">🟡 Verified vs DEAD code</text>

  <rect x="635" y="340" width="230" height="70" rx="3" fill="#2d0d0d" stroke="#ff4444" stroke-width="2"/>
  <text x="750" y="358" fill="#ff4444" font-size="10" text-anchor="middle">Recurrence + gated norm</text>
  <text x="750" y="372" fill="#aaa" font-size="9" text-anchor="middle">ssm_recurrence kernel</text>
  <text x="750" y="386" fill="#ff4444" font-size="9" text-anchor="middle">❓ Cos-sim with CPU path: ZERO</text>

  <!-- Dead code group -->
  <rect x="20" y="440" width="860" height="80" rx="4" fill="#1d0d0d" stroke="#ff4444" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="30" y="458" fill="#ff4444" font-size="13" font-weight="bold">DEAD / BROKEN CODE</text>

  <rect x="35" y="468" width="270" height="42" rx="3" fill="#2d0d0d" stroke="#ff4444" stroke-width="1"/>
  <text x="170" y="486" fill="#ff4444" font-size="10" text-anchor="middle">Old quant_matmul (column-major)</text>
  <text x="170" y="500" fill="#ff6644" font-size="9" text-anchor="middle">🔴 Wrong stride — garbage output</text>

  <rect x="315" y="468" width="270" height="42" rx="3" fill="#2d0d0d" stroke="#ff4444" stroke-width="1"/>
  <text x="450" y="486" fill="#ff4444" font-size="10" text-anchor="middle">F32 dequant SSM weights</text>
  <text x="450" y="500" fill="#ff6644" font-size="9" text-anchor="middle">🔴 2.2 GB waste — never used, never freed</text>

  <rect x="595" y="468" width="270" height="42" rx="3" fill="#2d0d0d" stroke="#ff4444" stroke-width="1"/>
  <text x="730" y="486" fill="#ff4444" font-size="10" text-anchor="middle">Prefill N>1 fallback</text>
  <text x="730" y="500" fill="#ff6644" font-size="9" text-anchor="middle">🔴 Calls old broken kernel</text>

  <!-- Legend -->
  <text x="20" y="545" fill="#888" font-size="11">Verification Key:</text>
  <rect x="20" y="552" width="12" height="12" rx="2" fill="#00ff88"/>
  <text x="36" y="563" fill="#00ff88" font-size="10">✅ Verified vs reference</text>
  <rect x="200" y="552" width="12" height="12" rx="2" fill="#ffaa00"/>
  <text x="216" y="563" fill="#ffaa00" font-size="10">🟡 Verified in isolation / known caveats</text>
  <rect x="470" y="552" width="12" height="12" rx="2" fill="#ff4444"/>
  <text x="486" y="563" fill="#ff4444" font-size="10">🔴 Broken / dead code / memory leak</text>

  <text x="20" y="590" fill="#ff4444" font-size="11" font-weight="bold">Memory leak: d_attn_qkv_q[40], d_attn_gate_q[40], d_ssm_out_q[40], d_qkv_f32[40], d_gate_f32[40], d_out_f32[40] — ZERO free() calls (5.5 GB)</text>
  <text x="20" y="610" fill="#888" font-size="10">DA principle: "What does this claim rest on?" — Phase 28b proved GPU_SUPPORT compiles and runs. Whether it produces correct output is UNKNOWN.</text>
</svg>