<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="monospace">
  <defs>
    <linearGradient id="done" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <linearGradient id="active" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">WuBuText AI — Phase Roadmap (May 15)</text>
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#666">Qwen3.6-35B-A3B → Pure C + CUDA | RTX 5050 6.4GB VRAM</text>

  <!-- P1 + P2 side-by-side -->
  <rect x="50" y="80" width="380" height="65" rx="8" fill="url(#phase1)" stroke="#66BB6A" stroke-width="2"/>
  <text x="240" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">P1: Embedding Graft ✓</text>
  <text x="240" y="119" text-anchor="middle" font-size="10" fill="#555">GGUF reader | Poincaré R=0.956 | 95% NN</text>
  <text x="240" y="135" text-anchor="middle" font-size="10" fill="#555">data/qwen36_embeddings_c.bin (2.03GB)</text>
  <rect x="50" y="80" width="20" height="65" rx="4" fill="#4CAF50"/><text x="60" y="118" text-anchor="middle" font-size="16" fill="white" font-weight="bold">✓</text>

  <rect x="470" y="80" width="380" height="65" rx="8" fill="url(#phase1)" stroke="#66BB6A" stroke-width="2"/>
  <text x="660" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">P2: Attention Port ✓</text>
  <text x="660" y="119" text-anchor="middle" font-size="10" fill="#555">30 SSM + 10 GQA layers</text>
  <text x="660" y="135" text-anchor="middle" font-size="10" fill="#555">CPU CE=12.66 | GPU weight loading fixed</text>
  <rect x="470" y="80" width="20" height="65" rx="4" fill="#4CAF50"/><text x="480" y="118" text-anchor="middle" font-size="16" fill="white" font-weight="bold">✓</text>

  <line x1="430" y1="112" x2="470" y2="112" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- P4 + P5 + P6 side-by-side row 2 -->
  <line x1="660" y1="145" x2="450" y2="145" stroke="#555" stroke-width="2"/>
  <line x1="450" y1="145" x2="450" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="50" y="175" width="250" height="65" rx="8" fill="url(#phase1)" stroke="#66BB6A" stroke-width="2"/>
  <text x="175" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">P4: MoE Port ✓</text>
  <text x="175" y="214" text-anchor="middle" font-size="10" fill="#555">Lazy dequant 9x | Nested 16x16</text>
  <text x="175" y="230" text-anchor="middle" font-size="10" fill="#555">396/396 tests</text>
  <rect x="50" y="175" width="16" height="65" rx="4" fill="#4CAF50"/><text x="58" y="214" text-anchor="middle" font-size="14" fill="white">4</text>

  <rect x="325" y="175" width="250" height="65" rx="8" fill="url(#phase1)" stroke="#66BB6A" stroke-width="2"/>
  <text x="450" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">P5: Vision Port ✓</text>
  <text x="450" y="214" text-anchor="middle" font-size="10" fill="#555">GPU ViT 217ms (256x256)</text>
  <text x="450" y="230" text-anchor="middle" font-size="10" fill="#555">Vision→text: 0 NaN</text>
  <rect x="325" y="175" width="16" height="65" rx="4" fill="#4CAF50"/><text x="333" y="214" text-anchor="middle" font-size="14" fill="white">5</text>

  <rect x="600" y="175" width="250" height="65" rx="8" fill="url(#phase1)" stroke="#66BB6A" stroke-width="2"/>
  <text x="725" y="196" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">P6: CUDA Kernels ✓</text>
  <text x="725" y="214" text-anchor="middle" font-size="10" fill="#555">SSM scan + MoE dispatch</text>
  <text x="725" y="230" text-anchor="middle" font-size="10" fill="#555">max_diff &lt; 6e-8</text>
  <rect x="600" y="175" width="16" height="65" rx="4" fill="#4CAF50"/><text x="608" y="214" text-anchor="middle" font-size="14" fill="white">6</text>

  <line x1="450" y1="240" x2="450" y2="270" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="240" x2="175" y2="270" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="240" x2="725" y2="270" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Phase 3: Training active -->
  <rect x="200" y="270" width="500" height="95" rx="10" fill="url(#phase3)" stroke="#FFB74D" stroke-width="2.5"/>
  <text x="450" y="292" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">P3: Training Loop ← ACTIVE</text>
  <text x="450" y="314" text-anchor="middle" font-size="11" fill="#555">RSGD ✅ | TST 8/8 ✅ | Poincaré GQA ✅ | Nested SSM K=4 ✅</text>
  <text x="450" y="332" text-anchor="middle" font-size="10" fill="#888">Data pipeline 1.07M tokens ✅ | GPU training CE=12.42</text>
  <text x="450" y="350" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">GAP: all modules standalone — no integration wiring</text>

  <rect x="200" y="270" width="20" height="95" rx="4" fill="#FF9800"/>
  <text x="210" y="325" text-anchor="middle" font-size="16" fill="white" font-weight="bold">→</text>

  <!-- Timeline bar -->
  <text x="50" y="415" font-size="13" font-weight="bold" fill="#333">Progress (May 14-15 sprint):</text>
  <rect x="50" y="425" width="800" height="12" rx="6" fill="#E0E0E0"/>
  <rect x="50" y="425" width="700" height="12" rx="6" fill="#4CAF50"/>
  <text x="780" y="435" text-anchor="middle" font-size="10" fill="#4CAF50" font-weight="bold">~87%</text>

  <!-- Key metrics box -->
  <rect x="50" y="460" width="800" height="140" rx="8" fill="#FAFAFA" stroke="#DDD"/>
  <text x="70" y="480" font-size="12" font-weight="bold" fill="#333">Key Metrics (May 15):</text>
  <text x="70" y="498" font-size="11" fill="#555">• P1-6: ALL DONE. RSGD ✅ Poincaré GQA ✅ Nested SSM K=4 ✅ TST ✅ Nested MoE ✅ CUDA kernels ✅</text>
  <text x="70" y="514" font-size="11" fill="#555">• GPU training: CE=12.42 | Lazy MoE in training | NN preservation 95%</text>
  <text x="70" y="530" font-size="11" fill="#555">• GPU vision: 217ms (256×256) ViT | Vision→text 0 NaN | Moondream3 weights dumped</text>
  <text x="450" y="498" font-size="11" fill="#555">• Data pipeline: 1.07M tokens | GPU weight loading fixed</text>
  <text x="450" y="514" font-size="11" fill="#555">• CUDA kernels: SSM scan + MoE dispatch (max_diff&lt;6e-8)</text>
  <text x="450" y="530" font-size="11" fill="#555">• Hardware: RTX 5050 (Blackwell SM120), 6.4GB VRAM, CUDA 13.1</text>
  <text x="70" y="554" font-size="11" fill="#e53935">⚠ Remaining: GPU vision pipeline timed out | ~0.5% NaN in logits | CPU RMSNorm OOB | Integration wiring</text>
  <text x="70" y="570" font-size="11" fill="#e53935">⚠ All math extensions are standalone — no train_gpu integration | No checkpointing</text>
  <text x="70" y="586" font-size="11" fill="#e53935">⚠ Memory budget unknown at full scale (6.4GB VRAM) | No correctness comparison vs Qwen3.6 reference</text>
</svg>
