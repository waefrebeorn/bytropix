<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="monospace">
  <defs>
    <linearGradient id="done" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8E6C9"/><stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <linearGradient id="critical" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4444"/><stop offset="100%" stop-color="#CC0000"/>
    </linearGradient>
    <linearGradient id="active" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF9C4"/><stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">bytropix Phase Roadmap — May 19 2026</text>
  <text x="450" y="48" text-anchor="middle" font-size="12" fill="#666">Qwen3.6-35B-A3B-UD-IQ2_M | Cos-sim: 0.9967 | Decode: 7.0 tok/s | 256k KV cache (F16)</text>

  <!-- Phase 0-6: Core -->
  <rect x="30" y="65" width="840" height="35" rx="4" fill="url(#done)"/>
  <text x="45" y="80" font-size="12" font-weight="bold" fill="#2E7D32">Phases 0-6</text>
  <text x="160" y="80" font-size="11" fill="#444">Core GGUF reader · SSM/GQA forward · Tokenizer · Output projection · GQA AVX2 FMA · Self-contained vec_dot</text>
  <text x="820" y="80" font-size="11" font-weight="bold" fill="#2E7D32">✅ DONE</text>

  <!-- Phase 7: Hardware Saturation -->
  <rect x="30" y="105" width="840" height="35" rx="4" fill="url(#done)"/>
  <text x="45" y="120" font-size="12" font-weight="bold" fill="#2E7D32">Phase 7</text>
  <text x="160" y="120" font-size="11" fill="#444">Hardware Saturation: AVX2 FMA for Q4_K/Q5_K/Q6_K · Stack buffers (~160 mallocs eliminated) · GQA opt</text>
  <text x="820" y="120" font-size="11" font-weight="bold" fill="#2E7D32">✅ DONE</text>

  <!-- Phase 8: MoE Optimization -->
  <rect x="30" y="145" width="840" height="35" rx="4" fill="url(#done)"/>
  <text x="45" y="160" font-size="12" font-weight="bold" fill="#2E7D32">Phase 8</text>
  <text x="160" y="160" font-size="11" fill="#444">MoE Opt: AVX2 IQ2_XXS vec_dot · OMP task dispatch (2× speedup) · Expert prefetch L3 · Output proj OMP</text>
  <text x="820" y="160" font-size="11" font-weight="bold" fill="#2E7D32">✅ DONE</text>

  <!-- Phase 9: Quantized-Only Path -->
  <rect x="30" y="185" width="840" height="35" rx="4" fill="url(#done)"/>
  <text x="45" y="200" font-size="12" font-weight="bold" fill="#2E7D32">Phase 9</text>
  <text x="160" y="200" font-size="11" fill="#444">Quantized-Only: F32 dequants removed (~5GB saved) · Blob pointers for SSM/GQA/MoE weights · Verified</text>
  <text x="820" y="200" font-size="11" font-weight="bold" fill="#2E7D32">✅ DONE</text>

  <!-- Phase 9.5: Q6_K Bug Fix (Critical) -->
  <rect x="30" y="225" width="840" height="40" rx="4" fill="url(#critical)"/>
  <text x="45" y="242" font-size="12" font-weight="bold" fill="#fff">Phase 9.5 ⭐</text>
  <text x="160" y="242" font-size="11" fill="#fee">Q6_K vec_dot AVX2 loop bug: j&lt;QK_K/32 → j&lt;QK_K/16. Cos-sim 0.794→0.9967. CRITICAL COMPLETENESS FIX.</text>
  <text x="820" y="245" font-size="11" font-weight="bold" fill="#66FF66">✅ FIXED</text>
  <text x="160" y="258" font-size="10" fill="#fcc">DA v10 "softmax vs sigmoid" theory was WRONG. Real bug: shared expert Q6_K output projection.</text>

  <!-- Phase 10: KV Cache 256k -->
  <rect x="30" y="270" width="840" height="35" rx="4" fill="url(#done)"/>
  <text x="45" y="285" font-size="12" font-weight="bold" fill="#2E7D32">Phase 10</text>
  <text x="160" y="285" font-size="11" fill="#444">KV Cache 256k: GQA_MAX_CTX 4096→262144 · F16 format (5GB vs 10GB) · Heap attn_weights · Direct cache reads</text>
  <text x="820" y="285" font-size="11" font-weight="bold" fill="#2E7D32">✅ DONE</text>

  <!-- Phase 11: IQ3_XXS AVX2 -->
  <rect x="30" y="310" width="840" height="35" rx="4" fill="url(#active)"/>
  <text x="45" y="325" font-size="12" font-weight="bold" fill="#E65100">Phase 11</text>
  <text x="160" y="325" font-size="11" fill="#555">IQ3_XXS AVX2 vec_dot: MoE down weights (98 bytes/block, grid+sign dequant). Currently generic C only.</text>
  <text x="820" y="325" font-size="11" font-weight="bold" fill="#E65100">🔜 NEXT</text>

  <!-- Phase 12: Future -->
  <rect x="30" y="350" width="840" height="35" rx="4" fill="#F5F5F5" stroke="#CCC" stroke-width="1"/>
  <text x="45" y="365" font-size="12" font-weight="bold" fill="#888">Phase 12+</text>
  <text x="160" y="365" font-size="11" fill="#999">Output proj speed · SSM AVX2 optimization · Lazy MoE cache · Chunked prefill · DSA sparse attention</text>
  <text x="820" y="365" font-size="11" fill="#999">FUTURE</text>

  <!-- Milestones -->
  <text x="30" y="415" font-size="13" font-weight="bold" fill="#333">Milestones</text>
  <line x1="30" y1="420" x2="870" y2="420" stroke="#CCC" stroke-width="1"/>

  <circle cx="60" cy="440" r="8" fill="#4CAF50"/>
  <text x="80" y="445" font-size="11" fill="#555">May 17: 0.3 tok/s, GQA broken</text>

  <circle cx="320" cy="440" r="8" fill="#4CAF50"/>
  <text x="340" y="445" font-size="11" fill="#555">May 18 AM: 4.7 tok/s, MoE OMP</text>

  <circle cx="580" cy="440" r="8" fill="#FF4444"/>
  <text x="600" y="445" font-size="11" fill="#555">May 18 PM: 0.794 cos-sim (Q6_K bug)</text>

  <circle cx="800" cy="440" r="8" fill="#4CAF50"/>
  <text x="710" y="465" font-size="11" fill="#555">May 19: 0.9967 cos-sim, 256k, 7.0 tok/s ✓</text>

  <line x1="68" y1="440" x2="312" y2="440" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="328" y1="440" x2="572" y2="440" stroke="#FF4444" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="588" y1="440" x2="792" y2="440" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="30" y="505" font-size="10" fill="#999">All phases verified against llama.cpp reference. Cos-sim measured via test_full_moe. Speed measured via gen_text PROFILE=1.</text>
</svg>
