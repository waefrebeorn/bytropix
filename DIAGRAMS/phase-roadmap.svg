<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="monospace">
  <defs>
    <linearGradient id="done" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <linearGradient id="active" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
    <linearGradient id="future" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#BDBDBD"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="phase46" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F3F3F3"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">WuBuText AI — Phase Roadmap</text>
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#666">Qwen3.6-35B-A3B → Pure C + CUDA | RTX 5050 6.4GB VRAM</text>

  <!-- Phase 1 -->
  <rect x="50" y="85" width="380" height="65" rx="8" fill="url(#phase1)" stroke="#66BB6A" stroke-width="2"/>
  <text x="240" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Phase 1: Embedding Graft ✓ DONE</text>
  <text x="240" y="124" text-anchor="middle" font-size="10" fill="#555">GGUF reader | Poincaré mapping | 95% NN preservation</text>
  <text x="240" y="140" text-anchor="middle" font-size="10" fill="#555">data/qwen36_embeddings_c.bin (2.03GB)</text>

  <rect x="50" y="85" width="20" height="65" rx="4" fill="#4CAF50"/>
  <text x="60" y="120" text-anchor="middle" font-size="16" fill="white" font-weight="bold">✓</text>

  <line x1="430" y1="117" x2="470" y2="117" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <rect x="470" y="85" width="380" height="65" rx="8" fill="url(#phase2)" stroke="#66BB6A" stroke-width="2"/>
  <text x="660" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">Phase 2: Attention Port ✓ DONE</text>
  <text x="660" y="124" text-anchor="middle" font-size="10" fill="#555">30 SSM + 10 GQA layers in C + CUDA</text>
  <text x="660" y="140" text-anchor="middle" font-size="10" fill="#555">9.53 tok/s GPU | 47.83× vs CPU</text>

  <rect x="470" y="85" width="20" height="65" rx="4" fill="#4CAF50"/>
  <text x="480" y="120" text-anchor="middle" font-size="16" fill="white" font-weight="bold">✓</text>

  <line x1="470" y1="150" x2="240" y2="150" stroke="#555" stroke-width="2"/>
  <line x1="660" y1="150" x2="450" y2="150" stroke="#555" stroke-width="2"/>
  <line x1="450" y1="150" x2="450" y2="175" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <rect x="200" y="175" width="500" height="80" rx="10" fill="url(#phase3)" stroke="#FFB74D" stroke-width="2.5"/>
  <text x="450" y="197" text-anchor="middle" font-size="15" font-weight="bold" fill="#E65100">Phase 3: Training Loop ← ACTIVE</text>
  <text x="450" y="217" text-anchor="middle" font-size="11" fill="#555">Tokenizer: fix O(N²) merge → TST bag embeddings + MCE loss → AdamW/RSGD</text>
  <text x="450" y="235" text-anchor="middle" font-size="10" fill="#888">Method: Token-Superposition Training (2605.06546) | Up to 2.5× speedup</text>
  <text x="450" y="250" text-anchor="middle" font-size="10" fill="#888">Bag size s=8 | Step ratio r=0.25 | Then recovery phase: standard CE</text>

  <rect x="200" y="175" width="20" height="80" rx="4" fill="#FF9800"/>
  <text x="210" y="220" text-anchor="middle" font-size="16" fill="white" font-weight="bold">→</text>

  <line x1="450" y1="255" x2="450" y2="285" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4 -->
  <rect x="50" y="285" width="250" height="65" rx="8" fill="url(#phase46)" stroke="#BDBDBD" stroke-width="2"/>
  <text x="175" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#616161">Phase 4: MoE Port</text>
  <text x="175" y="325" text-anchor="middle" font-size="10" fill="#888">256 experts, 8 active + 1 shared</text>
  <text x="175" y="340" text-anchor="middle" font-size="10" fill="#888">IQ2_XS/IQ1_S quantized</text>

  <rect x="50" y="285" width="16" height="65" rx="4" fill="#9E9E9E"/>
  <text x="58" y="322" text-anchor="middle" font-size="14" fill="white">4</text>

  <!-- Phase 5 -->
  <rect x="325" y="285" width="250" height="65" rx="8" fill="url(#phase46)" stroke="#BDBDBD" stroke-width="2"/>
  <text x="450" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#616161">Phase 5: Vision Port</text>
  <text x="450" y="325" text-anchor="middle" font-size="10" fill="#888">27-layer 3D ViT</text>
  <text x="450" y="340" text-anchor="middle" font-size="10" fill="#888">temporal_patch=2, spatial_merge=2</text>

  <rect x="325" y="285" width="16" height="65" rx="4" fill="#9E9E9E"/>
  <text x="333" y="322" text-anchor="middle" font-size="14" fill="white">5</text>

  <!-- Phase 6 -->
  <rect x="600" y="285" width="250" height="65" rx="8" fill="url(#phase46)" stroke="#BDBDBD" stroke-width="2"/>
  <text x="725" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#616161">Phase 6: CUDA Optimization</text>
  <text x="725" y="325" text-anchor="middle" font-size="10" fill="#888">cuBLAS matmul | SSM scan kernel</text>
  <text x="725" y="340" text-anchor="middle" font-size="10" fill="#888">MoE dispatch | FlashAttention</text>

  <rect x="600" y="285" width="16" height="65" rx="4" fill="#9E9E9E"/>
  <text x="608" y="322" text-anchor="middle" font-size="14" fill="white">6</text>

  <line x1="450" y1="255" x2="175" y2="285" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="255" x2="450" y2="285" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="255" x2="725" y2="285" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Timeline -->
  <text x="50" y="400" font-size="13" font-weight="bold" fill="#333">Project Timeline (May 2026)</text>

  <rect x="50" y="410" width="800" height="8" rx="4" fill="#E0E0E0"/>
  <rect x="50" y="410" width="200" height="8" rx="4" fill="#4CAF50"/>
  <rect x="250" y="410" width="150" height="8" rx="4" fill="#FF9800"/>
  <rect x="400" y="410" width="180" height="8" rx="4" fill="#9E9E9E"/>
  <rect x="580" y="410" width="150" height="8" rx="4" fill="#BDBDBD"/>
  <rect x="730" y="410" width="120" height="8" rx="4" fill="#E0E0E0"/>

  <text x="150" y="435" text-anchor="middle" font-size="10" fill="#4CAF50">Phase 1-2</text>
  <text x="325" y="435" text-anchor="middle" font-size="10" fill="#FF9800">Phase 3</text>
  <text x="490" y="435" text-anchor="middle" font-size="10" fill="#888">Phase 4</text>
  <text x="655" y="435" text-anchor="middle" font-size="10" fill="#888">Phase 5</text>
  <text x="790" y="435" text-anchor="middle" font-size="10" fill="#888">Phase 6</text>

  <!-- Key figures -->
  <rect x="50" y="460" width="800" height="120" rx="8" fill="#FAFAFA" stroke="#DDD"/>
  <text x="70" y="480" font-size="12" font-weight="bold" fill="#333">Key Metrics:</text>
  <text x="70" y="498" font-size="11" fill="#555">• Phase 1: 248320 embeddings → Poincaré ball (R=0.956, 95% NN preserved)</text>
  <text x="70" y="514" font-size="11" fill="#555">• Phase 2: 40-layer GPU forward = 419.85 ms → 9.53 tok/s (47.83× vs CPU)</text>
  <text x="70" y="530" font-size="11" fill="#555">• Phase 2.5: CUDA kernels for SSM delta net, GQA attention, activations, norms</text>
  <text x="450" y="498" font-size="11" fill="#555">• Phase 3 setup: TST paper (2605.06546) — bag s=8, MCE loss, r=0.25, 2.5× speedup</text>
  <text x="450" y="514" font-size="11" fill="#555">• Tokenizer: 248K vocab BBPE, O(N²) merge lookup → needs hash table fix</text>
  <text x="450" y="530" font-size="11" fill="#555">• Hardware: RTX 5050 (Blackwell SM120), 8GB VRAM, CUDA 13.1</text>
</svg>
