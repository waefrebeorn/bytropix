<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="monospace">
  <defs>
    <linearGradient id="done" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8E6C9"/><stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <linearGradient id="bug" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFCDD2"/><stop offset="100%" stop-color="#EF9A9A"/>
    </linearGradient>
    <linearGradient id="partial" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFF9C4"/><stop offset="100%" stop-color="#FFF176"/>
    </linearGradient>
    <linearGradient id="active" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE0B2"/><stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#E65100">🔥 Phase Roadmap (May 17 v10 — Post DA Audit)</text>
  <text x="450" y="55" text-anchor="middle" font-size="11" fill="#666">Output proj transpose FIXED. MoE expert layout = active root cause.</text>

  <!-- Phase boxes row 1 -->
  <rect x="50" y="80" width="250" height="65" rx="8" fill="url(#done)" stroke="#4CAF50" stroke-width="2"/>
  <text x="175" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Phase 0-2: Infra ✓</text>
  <text x="175" y="119" text-anchor="middle" font-size="10" fill="#555">GGUF reader | Embed | Attention</text>
  <text x="175" y="135" text-anchor="middle" font-size="10" fill="#555">733 tensors, 13 GGML types</text>

  <rect x="325" y="80" width="250" height="65" rx="8" fill="url(#active)" stroke="#E65100" stroke-width="2"/>
  <text x="450" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Phase 3-4: MoE 🐛</text>
  <text x="450" y="119" text-anchor="middle" font-size="10" fill="#555">Expert stride INTERLEAVED bug</text>
  <text x="450" y="135" text-anchor="middle" font-size="10" fill="#888">dims=[2048,512,256]—expert=innermost</text>

  <rect x="600" y="80" width="250" height="65" rx="8" fill="url(#done)" stroke="#4CAF50" stroke-width="2"/>
  <text x="725" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32">Phase 5-6: Vision ✓</text>
  <text x="725" y="119" text-anchor="middle" font-size="10" fill="#555">GPU ViT | CUDA kernels</text>
  <text x="725" y="135" text-anchor="middle" font-size="10" fill="#555">9× lazy dispatch</text>

  <line x1="300" y1="112" x2="325" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="575" y1="112" x2="600" y2="112" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow down -->
  <line x1="450" y1="145" x2="450" y2="175" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Inference debug box -->
  <rect x="100" y="175" width="700" height="100" rx="10" fill="url(#bug)" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="450" y="197" text-anchor="middle" font-size="14" font-weight="bold" fill="#B71C1C">P0: FIRST-TOKEN PARITY — ACTIVE</text>
  <text x="450" y="217" text-anchor="middle" font-size="11" fill="#555">Output proj transpose FIXED ✓. MoE expert stride bug FOUND but UNFIXED.</text>
  <text x="450" y="237" text-anchor="middle" font-size="10" fill="#888">Pre-fix cos-sim: -0.457 (anti-correlated). Post-fix: -0.001 (random — MoE still broken).</text>
  <text x="450" y="257" text-anchor="middle" font-size="10" fill="#D32F2F" font-weight="bold">Fix: stride-extract expert eid from each IQ2_XXS block (66 bytes → 256 vals → pick[eid])</text>

  <!-- Arrow down -->
  <line x1="450" y1="275" x2="450" y2="305" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DA Audit box -->
  <rect x="100" y="305" width="700" height="80" rx="8" fill="url(#partial)" stroke="#F57F17" stroke-width="1.5"/>
  <text x="450" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">DA Audit v10: 3 False ✅s Stripped</text>
  <text x="450" y="345" text-anchor="middle" font-size="10" fill="#555">❌ "MoE dequant correct" — interleaved layout not contiguous</text>
  <text x="450" y="362" text-anchor="middle" font-size="10" fill="#555">❌ "Output proj verified" — was transposed, only caught by DA</text>
  <text x="450" y="379" text-anchor="middle" font-size="10" fill="#555">❓ "SSM formulas verified" — never element-by-element vs ref</text>

  <!-- Arrow down -->
  <line x1="450" y1="385" x2="450" y2="415" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Timeline -->
  <text x="50" y="435" font-size="12" font-weight="bold" fill="#333">Bug Fix Progress:</text>
  <rect x="50" y="450" width="800" height="16" rx="8" fill="#E0E0E0"/>
  <rect x="50" y="450" width="200" height="16" rx="8" fill="#4CAF50"/>
  <rect x="260" y="450" width="340" height="16" rx="8" fill="#EF9A9A"/>
  <rect x="610" y="450" width="240" height="16" rx="8" fill="#FFE082"/>
  <text x="150" y="490" font-size="10" fill="#4CAF50">2 fixed (output proj)</text>
  <text x="420" y="490" font-size="10" fill="#D32F2F">1 active (MoE stride)</text>
  <text x="730" y="490" font-size="10" fill="#E65100">3 suspected</text>
</svg>
